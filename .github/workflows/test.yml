name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies with Python ${{ matrix.python-version }}
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run ruff check
        run: uv run ruff check examples/ tests/ src/

      - name: Run ruff format check
        run: uv run ruff format examples/ tests/ src/ --check

      - name: Run ty type check
        run: uv run ty check examples/ tests/ src/

      - name: Run pytest (unit tests only)
        run: uv run pytest tests/unit/ -v

  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-unit-test
    # pytest skipif will skip tests if OPENAI_API_KEY is not set

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras --python 3.12

      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: uv run pytest tests/integration/ -v