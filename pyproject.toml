[project]
name = "psi"
version = "0.1.0"
description = "Psi Agent Platform - portable, composable AI agents"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0.0",
    "aiosqlite>=0.19.0",
    "prompt-toolkit>=3.0.0",
    "loguru>=0.7.0",
]

[project.scripts]
psi-session = "psi_session:main"
psi-channel-tui = "psi_channel.tui:main"
psi-ai-openai = "psi_ai.openai:main"
psi-workspace = "psi_workspace:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/psi_session", "src/psi_channel", "src/psi_ai", "src/psi_workspace"]